# Use the .devcontainer configuration

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistants-api
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    stdin_open: true
    tty: true
    command: /bin/bash
